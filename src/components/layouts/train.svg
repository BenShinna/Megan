<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4088 4105" width="100%" height="100%">
  <style>
    .raw-sketch {
      fill: none;
      stroke: #2b2645;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tick-line {
      fill: none;
      stroke: #2b2645;
      stroke-width: 18.5;
      stroke-linecap: round;
    }
  </style>

  <!-- ==================== 终极绝对安全版：取消 Z 指令，改用首尾超越重叠 ==================== -->
  <!-- 每一圈都由两段超过 180 度的弧线拼成，终点直接盖在起点上，绝不触发浏览器闭合 Bug -->
  <g id="absolute-no-glitch-lines">
    <!-- 第 1 层 -->
    <path class="raw-sketch" stroke-width="4.2" opacity="0.78" 
          d="M 103,2052 a 1941,1984 0 1,0 3882,5 a 1941,1984 0 1,0 -3884,-10" />

    <!-- 第 2 层 -->
    <path class="raw-sketch" stroke-width="5.3" opacity="0.82" 
          d="M 141,2052 a 1894,1945 0 1,0 3778,6 a 1894,1945 0 1,0 -3780,-12" />

    <!-- 第 3 层 -->
    <path class="raw-sketch" stroke-width="6.2" opacity="0.85" 
          d="M 72,2052 a 1980,2013 0 1,0 3940,4 a 1980,2013 0 1,0 -3942,-8" />

    <!-- 第 4 层 -->
    <path class="raw-sketch" stroke-width="4.8" opacity="0.72" 
          d="M 56,2052 a 1988,1964 0 1,0 3976,5 a 1988,1964 0 1,0 -3978,-10" />

    <!-- 第 5 层 -->
    <path class="raw-sketch" stroke-width="5.0" opacity="0.79" 
          d="M 94,2060 a 1964,2018 0 1,0 3928,3 a 1964,2018 0 1,0 -3930,-6" />

    <!-- 【保留圆心左上偏】第 6 层：外圈不闭合重叠 -->
    <path class="raw-sketch" stroke-width="4.0" opacity="0.68" 
          d="M 6,2042 a 2026,2038 0 1,0 4052,7 a 2026,2038 0 1,0 -4054,-14" />

    <!-- 【保留圆心右下偏】第 7 层：外圈不闭合重叠 -->
    <path class="raw-sketch" stroke-width="5.6" opacity="0.74" 
          d="M 96,2058 a 1958,2001 0 1,0 3914,8 a 1958,2001 0 1,0 -3916,-16" />
  </g>

  <!-- ==================== 100% 像素级原样保留的四根刻度线 ==================== -->
  <g id="original-ticks">
    <path class="tick-line" d="M 646 398 L 1055 866" />
    <path class="tick-line" d="M 3630 714 L 3454 895" />
    <path class="tick-line" d="M 589 3493 L 752 3300" />
    <path class="tick-line" d="M 2293 3666 L 2355 4089" />
  </g>
</svg>
